name: Deploy To Heroku

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
      HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh

      - name: Login to Heroku Container Registry
        run: heroku container:login

      - name: Build Docker image
        run: docker build -t registry.heroku.com/$HEROKU_APP_NAME/web .

      - name: Push Docker image
        run: docker push registry.heroku.com/$HEROKU_APP_NAME/web

      - name: Release Docker image
        run: heroku container:release web -a $HEROKU_APP_NAME

      - name: Run migrations
        run: heroku run php artisan migrate --force -a $HEROKU_APP_NAME
